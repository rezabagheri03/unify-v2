# docker/docker-compose.dev.yml
# Development stack with hot reload. Use: docker-compose -f docker/docker-compose.dev.yml up

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unify-postgres-dev
    environment:
      POSTGRES_DB: unify_db
      POSTGRES_USER: unify_user
      POSTGRES_PASSWORD: unify_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - unify-net-dev

  redis:
    image: redis:7-alpine
    container_name: unify-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    networks:
      - unify-net-dev

  api:
    image: node:20-alpine
    container_name: unify-api-dev
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && npm install && npx prisma generate && npx prisma migrate deploy && npm run db:seed && npm run dev"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://unify_user:unify_password@postgres:5432/unify_db
      REDIS_URL: redis://redis:6379
      TZ: Asia/Tehran
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared-types/node_modules
      - api_storage_dev:/app/storage
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - unify-net-dev

  web:
    image: node:20-alpine
    container_name: unify-web-dev
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && npm install && npm run dev"
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - unify-net-dev

volumes:
  postgres_data_dev:
  redis_data_dev:
  api_storage_dev:

networks:
  unify-net-dev:
    driver: bridge
