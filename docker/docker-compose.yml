# docker/docker-compose.yml
# One-command local development

services:
  postgres:
    image: postgres:16-alpine
    container_name: unify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unify_db
      POSTGRES_USER: unify_user
      POSTGRES_PASSWORD: unify_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unify_user -d unify_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unify-net

  redis:
    image: redis:7-alpine
    container_name: unify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unify-net

  app:
    image: node:20-alpine
    container_name: unify-app
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache openssl git netcat-openbsd &&
        echo \"Waiting for database to be ready...\" &&
        for i in {1..30}; do
          if nc -z postgres 5432; then
            echo \"Database is ready!\" &&
            break
          fi
          echo \"Waiting for database... ($i/30)\" &&
          sleep 1
        done &&
        echo \"Generating Prisma client...\" &&
        cd /app && npx prisma generate --schema=./prisma/schema.prisma &&
        echo \"Running database migrations...\" &&
        cd /app && npx prisma migrate deploy --schema=./prisma/schema.prisma &&
        echo \"Seeding database...\" &&
        cd /app && npx prisma db seed --schema=./prisma/schema.prisma &&
        echo \"Starting development server...\" &&
        cd /app && npm run dev
      "
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://unify_user:unify_password@postgres:5432/unify_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      API_PORT: 3001
      TZ: Asia/Tehran
      PRISMA_DISABLE_POSTINSTALL_BITTE: 'true'
    volumes:
      - ..:/app
      - app_node_modules:/app/node_modules
      - app_api_node_modules:/app/apps/api/node_modules
      - app_web_node_modules:/app/apps/web/node_modules
      - app_packages_node_modules:/app/packages/shared-types/node_modules
      - app_storage:/app/storage
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - unify-net

volumes:
  postgres_data:
  redis_data:
  app_node_modules:
  app_api_node_modules:
  app_web_node_modules:
  app_packages_node_modules:
  app_storage:

networks:
  unify-net:
    driver: bridge