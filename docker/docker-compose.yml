# docker/docker-compose.yml
# Production-like stack. For development with hot reload use docker-compose.dev.yml

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unify_db
      POSTGRES_USER: unify_user
      POSTGRES_PASSWORD: unify_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unify_user -d unify_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unify-net

  redis:
    image: redis:7-alpine
    container_name: unify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unify-net

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: unify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://unify_user:unify_password@postgres:5432/unify_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      API_PORT: 3001
      TZ: Asia/Tehran
      # Pass-through secrets from host .env
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-1h}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      BCRYPT_COST_FACTOR: ${BCRYPT_COST_FACTOR:-12}
      STORAGE_BASE_PATH: /app/storage
      PUSHE_APP_ID: ${PUSHE_APP_ID:-}
      PUSHE_API_KEY: ${PUSHE_API_KEY:-}
      PUSHE_API_URL: ${PUSHE_API_URL:-https://api.pushe.co/v2}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      SEED_OWNER_USERNAME: ${SEED_OWNER_USERNAME:-owner}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-ChangeThisOnFirstLogin!1}
    volumes:
      - api_storage:/app/storage
    ports:
      - "3001:3001"
    networks:
      - unify-net

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: unify-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_SOCKET_URL: ${API_BASE_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    networks:
      - unify-net

  nginx:
    image: nginx:1.25-alpine
    container_name: unify-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - unify-net

volumes:
  postgres_data:
  redis_data:
  api_storage:
  nginx_logs:

networks:
  unify-net:
    driver: bridge
